services:
  pi-agent:
    image: ghcr.io/rapwind/aquaponics/pi-agent:latest
    container_name: pi-agent
    restart: unless-stopped
    env_file:
      - /home/actions/deploy/aquaponics/env/pi-agent.env
    network_mode: host
    privileged: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /sys/bus/w1:/sys/bus/w1:ro
      - /sys/devices:/sys/devices:ro
      - /dev:/dev
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'python src/main.py' | grep -v grep"]
      interval: 30s
      timeout: 5s
      retries: 3

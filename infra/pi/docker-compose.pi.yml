services:
  pi-agent:
    build:
      context: ../../apps/pi-agent
    image: aquaponics/pi-agent:latest
    container_name: pi-agent
    restart: unless-stopped
    env_file:
      - /home/actions/deploy/aquaponics/env/pi-agent.env
    network_mode: host
    privileged: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /sys/bus/w1:/sys/bus/w1:ro
      - /sys/devices:/sys/devices:ro
      - /dev:/dev
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python src/main.py' > /dev/null"]
      interval: 60s
      timeout: 5s
      retries: 3

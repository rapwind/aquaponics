name: Deploy — VPS

on:
  push:
    branches: [main]
    paths:
      - "apps/ingester/**"
      - "infra/vps/**"
      - "packages/contracts/**"

  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      app_name: ingester
      context: apps/ingester
      platforms: linux/amd64
    permissions:
      contents: read
      packages: write

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: vps-prod
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/vps

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/aquapi

            # Login to GHCR
            echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            # Save current state for rollback
            docker compose -f docker-compose.vps.yml ps --format json > /tmp/aquapi-pre-deploy.json || true

            # Pull and deploy
            docker compose -f docker-compose.vps.yml pull
            docker compose -f docker-compose.vps.yml up -d --remove-orphans

            # Health check
            sleep 15
            for SVC in mosquitto timescaledb grafana ingester; do
              STATUS=$(docker inspect --format='{{.State.Status}}' "aquapi-${SVC}-1" 2>/dev/null || echo "missing")
              if [ "$STATUS" != "running" ]; then
                echo "ERROR: ${SVC} is not running (status: ${STATUS})"
                docker logs "aquapi-${SVC}-1" --tail 30 || true
                exit 1
              fi
              echo "OK: ${SVC} is running"
            done

            echo "All services healthy"

name: deploy-vps

on:
  push:
    branches: [main]
    paths:
      - "apps/ingester/**"
      - "infra/vps/**"
      - ".github/workflows/deploy-vps.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-ingester:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build ingester image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/ingester:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/ingester:latest \
            ./apps/ingester

      - name: Push ingester image
        run: |
          docker push ghcr.io/${{ github.repository }}/ingester:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/ingester:latest

  deploy:
    needs: build-and-push-ingester
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            /home/app/deploy/aquaponics/repo/infra/vps/scripts/deploy.sh

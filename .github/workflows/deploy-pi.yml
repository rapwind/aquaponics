name: deploy-pi

on:
  push:
    branches: [main]
    paths:
      - "apps/pi-agent/**"
      - "infra/pi/**"
      - ".github/workflows/deploy-pi.yml"

jobs:
  deploy:
    runs-on: [self-hosted, Linux, ARM64, pi]
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup directories
        run: |
          mkdir -p /home/actions/deploy/aquaponics/env
          mkdir -p /home/actions/deploy/aquaponics/repo

      - name: Write env file
        run: |
          cat << 'EOF' > /home/actions/deploy/aquaponics/env/pi-agent.env
          ${{ secrets.PI_AGENT_ENV }}
          EOF

      - name: Sync repo
        run: |
          rsync -av --delete \
            $GITHUB_WORKSPACE/ \
            /home/actions/deploy/aquaponics/repo/

      - name: Deploy container
        run: |
          cd /home/actions/deploy/aquaponics/repo/infra/pi
          docker compose -f docker-compose.pi.yml up -d --build

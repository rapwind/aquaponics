name: deploy-pi

on:
  push:
    branches: [main]
    paths:
      - "apps/pi-agent/**"
      - "infra/pi/**"
      - ".github/workflows/deploy-pi.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-pi-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push arm64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ghcr.io/${{ github.repository }}/pi-agent:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/pi-agent:latest \
            --push \
            ./apps/pi-agent

  deploy:
    needs: build-and-push-pi-agent
    runs-on: [self-hosted, Linux, ARM64, pi, aquaponics, deploy]
    environment: prod

    steps:
      - name: GHCR login on Pi
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull latest image
        run: |
          docker pull ghcr.io/${{ github.repository }}/pi-agent:latest

      - name: Deploy with compose
        run: |
          docker compose \
            -f /home/actions/deploy/aquaponics/docker-compose.pi.yml \
            up -d

      - name: Cleanup old images
        run: |
          docker image prune -af || true

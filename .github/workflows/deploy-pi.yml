name: Deploy — Raspberry Pi

on:
  push:
    branches: [main]
    paths:
      - "apps/pi-agent/**"
      - "infra/pi/**"
      - "packages/contracts/**"

  workflow_dispatch:

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      app_name: pi-agent
      context: apps/pi-agent
      platforms: linux/arm64
    permissions:
      contents: read
      packages: write

  deploy:
    needs: build
    runs-on: [self-hosted, Linux, ARM64]
    environment: pi-prod
    env:
      COMPOSE_FILE: /home/actions/deploy/aquaponics/current/docker-compose.pi.yml
      IMAGE: ghcr.io/${{ github.repository }}/pi-agent
      DEPLOY_DIR: /home/actions/deploy/aquaponics
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Save current tag for rollback
        run: |
          CURRENT=$(docker inspect --format='{{index .Config.Image}}' aquaponics-pi-agent-1 2>/dev/null || echo "none")
          echo "PREVIOUS_IMAGE=${CURRENT}" >> "$GITHUB_ENV"
          echo "Previous image: ${CURRENT}"

      - name: Pull latest image
        run: docker pull "${IMAGE}:latest"

      - name: Update compose file and deploy
        run: |
          cd "${DEPLOY_DIR}"
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Health check
        id: healthcheck
        run: |
          echo "Waiting for container to start..."
          sleep 10
          CONTAINER=$(docker ps --filter "name=pi-agent" --format '{{.Names}}' | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "::error::pi-agent container not found"
            exit 1
          fi
          STATUS=$(docker inspect --format='{{.State.Status}}' "$CONTAINER")
          if [ "$STATUS" != "running" ]; then
            echo "::error::pi-agent is not running (status: $STATUS)"
            docker logs "$CONTAINER" --tail 50
            exit 1
          fi
          echo "pi-agent is running"

      - name: Rollback on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "::warning::Health check failed, rolling back to ${PREVIOUS_IMAGE}"
          if [ "${PREVIOUS_IMAGE}" != "none" ]; then
            cd "${DEPLOY_DIR}"
            docker compose down
            docker tag "${PREVIOUS_IMAGE}" "${IMAGE}:latest" || true
            docker compose up -d
            echo "Rollback complete"
          else
            echo "::error::No previous image to roll back to"
          fi

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deploy succeeded for pi-agent"
          else
            echo "::error::Deploy failed for pi-agent"
          fi

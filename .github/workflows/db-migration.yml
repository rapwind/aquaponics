name: DB Migration

on:
  push:
    branches: [main]
    paths:
      - "infra/vps/timescaledb/**"

  pull_request:
    branches: [main]
    paths:
      - "infra/vps/timescaledb/**"

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: aquaponics
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: aquaponics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aquaponics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run migration scripts (dry-run on PR)
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: aquaponics
          PGPASSWORD: testpassword
          PGDATABASE: aquaponics_test
        run: |
          for f in infra/vps/timescaledb/migrations/*.sql; do
            [ -f "$f" ] || { echo "No migration files found"; exit 0; }
            echo "Applying: $f"
            psql -f "$f"
          done
          echo "All migrations applied successfully"

  apply:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: vps-prod
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/vps/timescaledb

      - name: Apply migrations to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/actions/deploy/aquaponics

            for f in infra/vps/timescaledb/migrations/*.sql; do
              [ -f "$f" ] || { echo "No migration files"; exit 0; }
              echo "Applying: $f"
              docker exec aquaponics-timescaledb-1 psql -U aquaponics -d aquaponics -f "/migrations/$(basename $f)"
            done

            echo "Migrations applied"
